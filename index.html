<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Paiement Auralizs</title>
  <script src="https://js.stripe.com/v3/"></script>
  <style>
    body { font-family: Arial, sans-serif; background: #f5f5f5; margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
    .payment-container { background: #fff; padding: 50px 40px; border-radius: 15px; box-shadow: 0 12px 25px rgba(0,0,0,0.2); max-width: 500px; width: 90%; text-align: center; }
    h2 { margin-bottom: 30px; font-size: 28px; color: #333; }
    #card-element { border: 1px solid #ccc; padding: 25px; border-radius: 10px; font-size: 18px; }
    #submit { margin-top: 30px; padding: 18px 0; font-size: 20px; width: 100%; background-color: #6772e5; color: white; border: none; border-radius: 10px; cursor: pointer; transition: background 0.2s; }
    #submit:hover { background-color: #5469d4; }
    #payment-message { margin-top: 25px; font-weight: bold; font-size: 18px; color: green; }
  </style>
</head>
<body>

<div class="payment-container">
  <h2>Paiement 49 €</h2>
  <div id="card-element"></div>
  <button id="submit">Payer maintenant</button>
  <div id="payment-message"></div>
</div>

<script>
const stripe = Stripe('pk_live_51T7wzz0ym8Y244tlBLaDM42ZIJJZBcVNprvnCDOK7g4jAueYwUUqxK7adFqvvwDiyA8utoq6R7Px3uKGPbdviHUz007bGTiLLj');

const elements = stripe.elements();
const card = elements.create('card');
card.mount('#card-element');

document.getElementById('submit').addEventListener('click', async () => {
    const amount = 4900; // 49 € en centimes

    const res = await fetch('https://auralizs-site.vercel.app/api/create-payment-intent', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ amount })
    });

    const data = await res.json();

    const { error, paymentIntent } = await stripe.confirmCardPayment(data.clientSecret, {
        payment_method: { card }
    });

    if (error) {
        document.getElementById('payment-message').innerText = error.message;
        document.getElementById('payment-message').style.color = 'red';
    } else if (paymentIntent.status === 'succeeded') {
        document.getElementById('payment-message').innerText = 'Paiement réussi ! ✅';
        document.getElementById('payment-message').style.color = 'green';
    }
});
</script>

</body>
</html>
