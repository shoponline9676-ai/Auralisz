<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Auralizs ZS® | AirPods, Apple Watch & Accessoires Premium</title>

<style>
/* Tes styles restent les mêmes */
</style>
</head>
<body>

<script>
/**
 * LA SEULE MODIFICATION EST ICI
 * On change localhost par le chemin relatif pour Vercel
 */
var STRIPE_API_URL = '/api/create-payment'; 
var STRIPE_PUBLISHABLE_KEY = 'pk_live_...'; // Assure-toi que TA clé PK est bien ici

// --- LOGIQUE DE PAIEMENT ---
var stripe, elements, cardElement;

async function initStripe() {
  if (stripe) return;
  stripe = Stripe(STRIPE_PUBLISHABLE_KEY);
  elements = stripe.elements();
  cardElement = elements.create('card', {
    style: {
      base: { fontSize: '16px', color: '#32325d' }
    }
  });
  cardElement.mount('#card-element');
}

async function handlePayment() {
  const btn = document.getElementById('pay-btn');
  btn.disabled = true;
  btn.textContent = "Traitement...";

  try {
    const response = await fetch(STRIPE_API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        amount: total * 100, // Total en centimes
        currency: 'eur',
        email: document.getElementById('email').value
      })
    });

    const data = await response.json();
    if (data.error) throw new Error(data.error);

    const result = await stripe.confirmCardPayment(data.clientSecret, {
      payment_method: { card: cardElement }
    });

    if (result.error) {
      alert(result.error.message);
    } else {
      if (result.paymentIntent.status === 'succeeded') {
        showPage('success');
      }
    }
  } catch (err) {
    console.error(err);
    alert("Erreur lors de l'initialisation du paiement.");
  } finally {
    btn.disabled = false;
    btn.textContent = "Confirmer et Payer";
  }
}

// [Le reste de tes fonctions JS comme toggleMobileMenu, etc.]
</script>
</body>
</html>
